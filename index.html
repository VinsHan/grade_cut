<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사바나 결정사: 50단계 연애 먹이사슬 도감</title>
    <style>

        .container { background-color: #fff; padding: 40px; border-radius: 20px; box-shadow: 0 15px 30px rgba(0,0,0,0.1); width: 100%; max-width: 650px; text-align: center; }
        h1 { color: #2e7d32; margin-bottom: 5px; font-size: 1.8em; }
        p.subtitle { color: #666; margin-bottom: 15px; font-size: 0.9em; }
        
        /* ⭐️ 추가된 개인정보 안심 알림창 스타일 */
        .privacy-notice { background-color: #ffebee; color: #c62828; padding: 12px 15px; border-radius: 8px; font-size: 0.9em; font-weight: bold; margin-bottom: 25px; border: 1px dashed #ef9a9a; word-break: keep-all; line-height: 1.4; }
        
        .form-row { display: flex; gap: 15px; margin-bottom: 15px; }
        .form-group { flex: 1; text-align: left; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #444; font-size: 0.9em; }
        input[type="number"], select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 1em; }
        .radio-group { display: flex; gap: 15px; margin-top: 5px; padding: 10px 0; }
        
        button.analyze-btn { background-color: #2e7d32; color: white; padding: 15px; border: none; border-radius: 10px; cursor: pointer; width: 100%; font-size: 1.2em; font-weight: bold; margin-top: 15px; transition: 0.2s; }
        button.analyze-btn:hover { background-color: #1b5e20; transform: translateY(-2px); }
        
        #resultArea { display: none; margin-top: 30px; animation: fadeIn 0.5s ease-in-out; }
        
        .animal-box { background: #e8f5e9; border: 3px solid #a5d6a7; border-radius: 15px; padding: 25px; margin-bottom: 20px; position: relative;}
        .animal-emoji { font-size: 6em; margin: 10px 0; line-height: 1; }
        .animal-title { font-size: 2em; font-weight: bold; color: #1b5e20; margin-bottom: 5px; }
        .rank-display { font-size: 1.1em; font-weight: bold; color: #388e3c; margin-bottom: 15px; background: white; display: inline-block; padding: 5px 15px; border-radius: 20px;}
        .tier-badge { position: absolute; top: 10px; right: 10px; background: #2e7d32; color: white; padding: 5px 10px; border-radius: 5px; font-size: 0.8em; font-weight: bold;}
        
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; text-align: left; margin-bottom: 20px; }
        .stat-item { background: #f5f5f5; padding: 10px; border-radius: 8px; font-size: 0.9em; border-left: 4px solid #2e7d32; }
        
        .commentary { background-color: #fffde7; padding: 25px; border-radius: 12px; border: 2px solid #ffd54f; text-align: left; font-size: 1em; line-height: 1.8; margin-bottom: 20px; color: #3e2723; }
        .commentary h3 { margin-top: 0; color: #f57f17; border-bottom: 1px solid #ffe082; padding-bottom: 10px; font-size: 1.2em; display: flex; align-items: center; gap: 8px; }
        
        .match-profile { border: 2px dashed #2e7d32; padding: 20px; border-radius: 15px; background-color: #f1f8e9; text-align: left; position: relative; }
        .match-profile h3 { color: #1b5e20; margin-top: 0; padding-bottom: 10px; border-bottom: 1px solid #c5e1a5; }
        .match-profile .match-emoji { font-size: 2.5em; position: absolute; right: 20px; top: 15px; }
        .match-specs { font-size: 0.95em; line-height: 1.6; color: #444; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <h1>🦓 사바나 결정사: 연애 계급 판독기</h1>
    <p class="subtitle">상위 1% 사자부터 하위 100% 기생충까지, 당신의 족보를 까드립니다.</p>
    
    <div class="privacy-notice">
        🚨 안심하세요! 입력하신 모든 정보는 서버에 저장되거나 수집되지 않습니다.<br>
        오직 본인의 기기(브라우저)에서만 계산용으로 사용되며, 페이지를 끄면 즉시 증발합니다.
    </div>

    <div id="formArea">
        <div class="form-group" style="margin-bottom: 15px;">
            <label>1. 성별</label>
            <div class="radio-group">
                <label><input type="radio" name="gender" value="male" checked> 남성 ♂️</label>
                <label><input type="radio" name="gender" value="female"> 여성 ♀️</label>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>2. 나이 (만)</label>
                <input type="number" id="age" placeholder="예: 31">
            </div>
            <div class="form-group">
                <label>3. 키(cm) / 몸무게(kg)</label>
                <div style="display: flex; gap: 5px;">
                    <input type="number" id="height" placeholder="175">
                    <input type="number" id="weight" placeholder="70">
                </div>
            </div>
        </div>
        <div class="form-group" style="margin-bottom: 15px;">
            <label>4. 현실적인 직업군</label>
            <select id="job">
                <option value="1">전문직 (의사/판검사/회계사) / 기업 오너 일가</option>
                <option value="10">대기업 / 금융권 / 7급 공무원 / 교사</option>
                <option value="25">건실한 중견기업 / 공기업 / 대학병원 간호사</option>
                <option value="40">탄탄한 강소기업 / 매출 높은 안정적 자영업</option>
                <option value="60">일반 중소기업 정규직 / 9급 공무원</option>
                <option value="80">소상공인 (영세 자영업) / 프리랜서 / 계약직</option>
                <option value="95">단기 아르바이트 / 무직 / 취업준비생</option>
            </select>
        </div>
        <div class="form-group" style="margin-bottom: 15px;">
            <label>5. 최종 학력</label>
            <select id="education">
                <option value="2">의/치/한/약/수 또는 SKY</option>
                <option value="10">서성한 / 중경외시 / 주요 지거국</option>
                <option value="30">인서울 4년제 / 수도권 4년제</option>
                <option value="60">지방 4년제</option>
                <option value="85">전문대 / 고졸 이하</option>
            </select>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>6. 연봉 (만원, 세전)</label>
                <input type="number" id="income" placeholder="예: 4500">
            </div>
            <div class="form-group">
                <label>7. 순자산 (만원, 대출제외)</label>
                <input type="number" id="assets" placeholder="예: 10000">
            </div>
        </div>
        <div class="form-group" style="margin-bottom: 15px;">
            <label>8. 본인이 생각하는 내 외모 점수 (1~10점)</label>
            <input type="number" id="looks" min="1" max="10" placeholder="양심껏 입력하세요.">
        </div>
        <button class="analyze-btn" onclick="calculateRank()">족보 확인하기</button>
    </div>

    <div id="resultArea">
        <div class="animal-box">
            <div class="tier-badge" id="tierBadge">포식자 티어</div>
            <div class="animal-title" id="animalTitle">수사자</div>
            <div class="animal-emoji" id="animalEmoji">🦁</div>
            <div class="rank-display" id="rankDisplay">종합 상위 1.0%</div>
            <p style="color:#666; font-size:0.9em; margin-top:10px;" id="animalDesc">결혼 생태계의 황제.</p>
        </div>
        
        <div class="stat-grid" id="breakdownDisplay"></div>
        <div class="commentary" id="commentaryDisplay"></div>

        <div class="match-profile" id="matchProfile">
            <h3>💞 당신에게 어울리는 짝 (상위 10% 미만 한정)</h3>
            <div class="match-emoji" id="matchEmoji">👫</div>
            <div class="match-specs" id="matchSpecs"></div>
        </div>
    </div>
</div>

    function calculateRank() {
        const gender = document.querySelector('input[name="gender"]:checked').value;
        const age = parseInt(document.getElementById('age').value);
        const jobPct = parseFloat(document.getElementById('job').value);
        const eduPct = parseFloat(document.getElementById('education').value);
        const height = parseFloat(document.getElementById('height').value);
        const weight = parseFloat(document.getElementById('weight').value);
        const income = parseFloat(document.getElementById('income').value);
        const assets = parseFloat(document.getElementById('assets').value);
        const looks = parseInt(document.getElementById('looks').value);

        if(!age || !height || !weight || !income || !looks) { alert("빈칸 없이 모든 정보를 꽉 채워야 초원에 입장할 수 있습니다."); return; }
        if(looks < 1 || looks > 10) { alert("외모 점수는 1점에서 10점 사이로 입력해주세요."); return; }

        const bmi = weight / ((height/100) * (height/100));
        let bmiPct = 50;
        if (gender === 'male') {
            if (bmi >= 18.5 && bmi < 23) bmiPct = 1;
            else if (bmi >= 23 && bmi < 25) bmiPct = 20;
            else if (bmi >= 25 && bmi < 28) bmiPct = 60;
            else bmiPct = 95;
        } else {
            if (bmi >= 18 && bmi < 21) bmiPct = 1;
            else if (bmi >= 21 && bmi < 23) bmiPct = 20;
            else if (bmi >= 23 && bmi < 25) bmiPct = 60;
            else bmiPct = 95;
        }

        let agePct = 50;
        if (gender === 'male') {
            if(age < 26) agePct = 80;      
            else if(age <= 27) agePct = 60; 
            else if(age <= 29) agePct = 20; 
            else if(age <= 32) agePct = 1;  
            else if(age <= 34) agePct = 10; 
            else if(age <= 36) agePct = 30; 
            else if(age <= 38) agePct = 60; 
            else if(age <= 40) agePct = 85; 
            else agePct = 99;               
        } else {
            if(age < 23) agePct = 80;      
            else if(age <= 24) agePct = 40; 
            else if(age <= 26) agePct = 10; 
            else if(age <= 29) agePct = 1;  
            else if(age <= 31) agePct = 15; 
            else if(age <= 33) agePct = 35; 
            else if(age <= 35) agePct = 65; 
            else if(age <= 37) agePct = 85; 
            else agePct = 99;               
        }

        let incomePct = gender === 'male' ? Math.max(1, 100 - (income/80)) : Math.max(1, 100 - (income/50));
        let assetsPct = Math.max(1, 100 - (assets/200));
        let looksPct = Math.max(1, Math.min(99, 100 - (looks * 10) + 5));

        let totalPct = 0;
        if(gender === 'male') {
            totalPct = (jobPct * 0.20) + (incomePct * 0.15) + (assetsPct * 0.15) + (agePct * 0.15) + (looksPct * 0.15) + (bmiPct * 0.10) + (eduPct * 0.10);
        } else {
            totalPct = (agePct * 0.25) + (looksPct * 0.25) + (bmiPct * 0.15) + (jobPct * 0.15) + (incomePct * 0.10) + (assetsPct * 0.05) + (eduPct * 0.05);
        }
        let finalRank = Math.max(0.1, Math.min(99.9, totalPct));

        document.getElementById('formArea').style.display = 'none';
        document.getElementById('resultArea').style.display = 'block';

        let myAnimal = savannaDoGam.find(d => finalRank <= d.pct) || savannaDoGam[savannaDoGam.length - 1];

        document.getElementById('animalTitle').innerText = myAnimal.name;
        document.getElementById('animalEmoji').innerText = myAnimal.emoji;
        document.getElementById('tierBadge').innerText = myAnimal.tier;
        document.getElementById('rankDisplay').innerText = `결혼 시장 종합 상위 ${finalRank.toFixed(1)}%`;
        document.getElementById('animalDesc').innerText = myAnimal.desc;

        document.getElementById('breakdownDisplay').innerHTML = `
            <div class="stat-item">💼 <strong>직업:</strong> 상위 ${jobPct}% 구간</div>
            <div class="stat-item">🎂 <strong>나이:</strong> ${age}세 (상위 ${agePct.toFixed(0)}%)</div>
            <div class="stat-item">✨ <strong>외모:</strong> 자가진단 ${looks}점</div>
            <div class="stat-item">💰 <strong>연봉:</strong> 상위 ${incomePct.toFixed(0)}% 구간</div>
        `;

        // 🎙️ 맞춤형 팩폭 2단 콤보 (종족 특성 + 개인 스탯 최악의 단점)
        let worstStat = Math.max(agePct, bmiPct, jobPct, incomePct, looksPct);
        let commentHtml = `<h3>🎙️ 동물의 왕국 심층 관찰 일지: ${myAnimal.name} 편</h3>`;
        
        // 1단 콤보: 동물별 고유 팩폭
        commentHtml += `<p><strong>[종족 생존 특성]</strong><br>${myAnimal.obsLog}</p>`;
        commentHtml += `<hr style="border:0; border-top:1px dashed #ffd54f; margin: 15px 0;">`;
        
        // 2단 콤보: 스탯 기반 약점 팩폭
        commentHtml += `<p><strong>[🚨 AI가 포착한 치명적 생존 위협]</strong></p>`;
        if (worstStat > 70) {
            if (worstStat === looksPct) {
                commentHtml += `<p>유전적 매력도(본판)에서 심각한 결함을 보이고 있습니다. 슬프게도 소개팅 생태계에서는 '성격 좋은 내면'을 어필하기도 전에 '얼굴'에서 1차 서류 탈락을 당합니다. 패션과 헤어스타일, 피부과 등 거울을 보고 뼈를 깎는 개조를 거치지 않으면 도태될 것입니다.</p>`;
            } 
            else if (worstStat === agePct) {
                if ((gender === 'male' && age < 28) || (gender === 'female' && age < 25)) {
                    commentHtml += `<p>결혼 생태계(결정사)에 뛰어들기엔 말 그대로 '핏덩이' 수준입니다. 아직 독립적인 사냥(경제력) 준비도 안 된 상태로 잔혹한 짝짓기 시장에 기웃거리지 마십시오. 지금은 소개팅 어플을 켤 때가 아니라 자격증 책을 펴고 종잣돈을 모아야 할 시기입니다.</p>`;
                } else {
                    commentHtml += `<p>생물학적 전성기를 완전히 지나 늙어가는 개체로, 파릇파릇한 젊은 경쟁자들에게 매일 짓밟히고 있습니다. 눈높이를 지하 암반수 수준으로 대폭 낮추거나 '압도적인 재력'으로 어린 개체를 꼬시는 수밖에 없습니다. 안 되면 반려견과 함께 평화를 찾으십시오.</p>`;
                }
            } 
            else if (worstStat === bmiPct) {
                commentHtml += `<p>겨울잠을 준비하는 곰처럼 생존에 불필요한 지방(뱃살)을 몸에 과도하게 축적했습니다. 둔탁한 움직임과 숨 가빠하는 소리는 이성들의 식욕과 호감을 동시에 박살 냅니다. 당장 배달 앱을 지우고 헬스장으로 뛰쳐가지 않으면 평생 혼자 넷플릭스를 보며 야식을 시켜 먹게 될 것입니다.</p>`;
            } 
            else if (worstStat === jobPct) {
                commentHtml += `<p>둥지를 틀 나뭇가지조차 마련하지 못한 척박한 상태입니다. 언제 쫓겨날지 모르는 불안정한 생존 기반(직업) 탓에, 그 어떤 이성도 당신과 가족을 꾸리는 미친 도박을 하고 싶어 하지 않습니다. 당장 연애 세포를 끄고 사람인과 잡코리아를 켜십시오.</p>`;
            } 
            else if (worstStat === incomePct) {
                commentHtml += `<p>사냥 능력이 처참한 수준입니다. 하루 종일 뛰어다녀서 물어오는 먹이(연봉)가 초라하여 본인 입에 풀칠하기도 버겁습니다. 자본주의 사바나에서 돈은 가장 강력한 페로몬입니다. "가난해도 사랑만 있으면 돼"라는 망상은 접어두고 주말에 배민 커넥트라도 뛰십시오.</p>`;
            }
        } else {
            commentHtml += `<p>놀랍게도 이 개체는 스탯상 치명적인 하자가 없습니다. 털 윤기도 좋고 사냥 능력도 양호합니다. <strong>그런데도 짝이 없다면?</strong> 본인의 눈이 안드로메다에 가 있거나, 통계로 잡히지 않는 심각한 '성격파탄'일 확률이 99%입니다. 주제 파악만 잘하면 내일이라도 결혼합니다.</p>`;
        }
        document.getElementById('commentaryDisplay').innerHTML = commentHtml;

        let matchSpecs = "";
        let matchEmoji = "";
        let matchTitle = document.querySelector('.match-profile h3');
        const matchDiv = document.getElementById('matchProfile');
        
        matchDiv.style.display = 'block';

        if (finalRank <= 10) {
            matchTitle.innerText = "💞 당신에게 어울리는 짝 (상위 10% 포식자)";
            if (gender === 'male') {
                matchSpecs = `<strong>[상위 10% 암사자 스펙]</strong><br>- 나이: 20대 후반 ~ 30대 초반<br>- 직업: 대기업, 전문직, 금융권 공기업<br>- 체형: 키 163cm 이상, 필라테스로 다져진 탄탄함<br>- 자산: 본인 모은 돈 1억 이상<br>- 특징: 완벽한 내/외조가 가능한 트로피 배우자.`;
                matchEmoji = "👸";
            } else {
                matchSpecs = `<strong>[상위 10% 수사자 스펙]</strong><br>- 나이: 30대 초/중반<br>- 직업: 전문직, 10대 대기업 책임급, 사업가<br>- 체형: 키 178cm 이상, 넓은 어깨<br>- 자산: 순자산 5억 이상 (서울 자가 또는 전세)<br>- 특징: 경제적 자유와 듬직함을 주는 알파메일.`;
                matchEmoji = "🤴";
            }
        } else if (finalRank <= 70) {
            matchTitle.innerText = "💞 당신에게 어울리는 짝 (현실적인 동물계)";
            if (gender === 'male') {
                matchSpecs = `<strong>[현실적인 동급 포유류 짝꿍]</strong><br>- 나이: 본인과 1~4살 차이<br>- 직업: 중견/중소기업 사무직, 보육교사 등<br>- 체형: 지극히 평범하고 친근한 체형<br>- 특징: 화려하진 않지만 주말에 함께 배달 음식 시켜 먹으며 대출 이자를 갚아갈 든든한 동반자.`;
                matchEmoji = "👩‍💼";
            } else {
                matchSpecs = `<strong>[현실적인 동급 포유류 짝꿍]</strong><br>- 나이: 동갑 ~ 4살 연상<br>- 직업: 대리/과장급 중견/중소기업 직장인<br>- 체형: 살짝 배가 나왔지만 인상 좋은 평범남<br>- 특징: 로맨틱하진 않지만 가정을 위해 묵묵히 책임감을 다하며 월급을 갖다 바칠 착한 남편.`;
                matchEmoji = "👨‍💼";
            }
        } else {
            matchTitle.innerText = "🛑 생태계 붕괴: 짝짓기 불가";
            matchTitle.style.color = "#c62828";
            matchDiv.style.borderColor = "#c62828";
            matchDiv.style.backgroundColor = "#ffebee";
            
            matchSpecs = `<strong>[추천 이성: 없음]</strong><br><br>
            본인 한 몸 건사하기도 벅찬 생태계 최하위 티어입니다. 곤충 및 미생물 생태계에서 연애와 결혼은 사치이자 상대방에 대한 <strong>심각한 민폐</strong>입니다.<br><br>
            소개팅 어플은 지금 당장 삭제하시고, 노후 대비용 연금 저축 펀드나 가입하십시오. 이번 생은 <strong>'반려식물'</strong>이나 <strong>'로봇 청소기'</strong>와 함께 마음 편히 독거하시는 것을 AI가 강력히 권장합니다.`;
            matchEmoji = "🧘‍♂️";
        }
        
        document.getElementById('matchEmoji').innerText = matchEmoji;
        document.getElementById('matchSpecs').innerHTML = matchSpecs;
    }
</script>
</body>
</html>
